apis:
- name: AWS Lake Formation API
  description: >-
    The AWS Lake Formation API provides programmatic access to build and manage
    data lakes with centralized governance. It enables developers to register
    data sources, configure data permissions, manage data catalog resources,
    grant and revoke fine-grained access controls, and automate data ingestion
    and transformation workflows.
